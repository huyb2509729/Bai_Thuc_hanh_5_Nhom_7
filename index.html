<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> Trang web Infographic và Video</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        .infographic {
            margin-bottom: 30px;
        }
        .infographic img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border-radius: 10px;
        }
        .video-container {
            display: flex;
            justify-content: center;
        }
        video {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <h1>Infographic và Video MP4</h1>
    <footer>
       <hr>
       <p>: nguồn AI trên capcut và canva.</p>
    <footer>
    <div class="infographic">
        <h2>Infographic minh họa</h2>
        <img src="https://github.com/huyb2509729/Bai_Thuc_hanh_5_Nhom_7/blob/master/NV%202/B%C3%A0i%202%20th%E1%BB%B1c%20h%C3%A0nh%205%20nh%C3%B3m%207.jpg" alt="Infographic mẫu">
        <!-- Bạn hãy thay URL trên bằng link ảnh infographic bạn muốn -->
    </div>

    <div class="video-container">
        <video controls>
            <source src="NV 2/Video.mp4" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
        <!-- Thay link src bằng video MP4 của bạn nếu muốn -->
    </div> 
</body>
</html>
